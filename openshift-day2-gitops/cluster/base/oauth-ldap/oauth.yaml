apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
    - name: ldap-konsalt
      mappingMethod: claim
      type: LDAP
      ldap:
        attributes:
          id:
            - sAMAccountName
          email:
            - mail
          name:
            - cn
          preferredUsername:
            - sAMAccountName
        bindDN: CN=ldap_user,OU=Konsalt,DC=example,DC=com
        bindPassword:
          name: ldap-bind-password
        ca:
          name: ldap-ca
        insecure: false
        url: ldaps://ldap.example.com/OU=Konsalt,DC=example,DC=com?sAMAccountName?sub?(objectClass=person)
