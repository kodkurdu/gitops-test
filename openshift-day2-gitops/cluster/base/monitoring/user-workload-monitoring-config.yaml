apiVersion: v1
kind: ConfigMap
metadata:
  name: user-workload-monitoring-config
  namespace: openshift-user-workload-monitoring
data:
  config.yaml: |
    prometheus:
      retention: 15d
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-dynamic
          resources:
            requests:
              storage: 40Gi
    thanosRuler:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-dynamic
          resources:
            requests:
              storage: 10Gi
