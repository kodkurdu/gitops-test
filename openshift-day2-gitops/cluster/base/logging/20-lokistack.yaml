apiVersion: loki.grafana.com/v1
kind: LokiStack
metadata:
  name: logging-loki
  namespace: openshift-logging
spec:
  managementState: Managed
  size: 1x.extra-small
  storageClassName: nfs-dynamic
  storage:
    schemas:
      - effectiveDate: "2024-01-01"
        version: v13
    secret:
      name: logging-loki-objectstorage
      type: s3
  tenants:
    mode: openshift-logging
