apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-day2-root
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/REPLACE_ME/openshift-day2-gitops.git
    targetRevision: main
    path: cluster/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
